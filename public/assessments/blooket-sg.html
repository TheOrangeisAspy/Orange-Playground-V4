          window.addEventListener('load', () => {
              const loader = document.querySelector('.loader');
              if (loader) loader.classList.add('loader--hidden');
          });
        </script>
        <script>
            const savedTheme = localStorage.getItem('theme') || 'original-orange';
            document.write(`<link id="themeStylesheetLink" rel="stylesheet" href="/assets/css/themes/${savedTheme}.css">`);
        </script>
        <script src="../assets/js/loader-message.js" defer></script>
    </head>

        <!-- Scramjet bundles -->
        <script src="../scram/scramjet.all.js"></script>
        <script src="../scram/register-sw.js"></script>
        <!-- BareMux -->
        <script src="../baremux/index.js" defer></script>
        <script src="../epoxy/index.js" defer></script>

        <script>
            const params = new URLSearchParams(window.location.search);
            const gameTitle = params.get('title') || 'Blooket SG';
            const embedUrl = params.get('url') || '';

            document.title = `Orange Playground - ${gameTitle}`;

            document.addEventListener('DOMContentLoaded', async () => {
                const loader = document.querySelector('.loader');
                const label = document.querySelector('.nav-label');
                const message = document.getElementById('message');

                if (label) label.textContent = gameTitle;
                if (!embedUrl && message) message.textContent = 'No proxy game URL provided.';
                if (loader) loader.classList.add('loader--hidden');

                try {
                    await registerSW();
                } catch (err) {
                    console.error('Failed to register service worker.', err);
                }

                if (embedUrl) {
                    const { ScramjetController } = $scramjetLoadController();
                    const scramjet = new ScramjetController({
                        files: {
                            wasm: "/scram/scramjet.wasm.wasm",
                            all: "/scram/scramjet.all.js",
                            sync: "/scram/scramjet.sync.js",
                        },
                    });
                    scramjet.init();
                    const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
                    let wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
                    if ((await connection.getTransport()) !== "/libcurl/index.mjs") {
                        await connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
                    }
                    const frame = scramjet.createFrame();
                    frame.frame.id = "sj-frame";
                    document.body.appendChild(frame.frame);
                    frame.go(embedUrl);
                }
            });
        </script>
        <script src="../assets/js/cloaker.js"></script>
        <script src="../assets/js/panic-key.js"></script>
        <script src="../assets/js/theme-selector.js"></script>
        <script src="navigation.js"></script>
    </body>
</html>
